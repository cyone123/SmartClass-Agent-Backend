# 意图识别评估用例 - 混合意图

case_id: intent_mixed_001
category: intent_recognition
description: "处理混合闲聊和教学请求的消息"
version: "1.0"

# 测试输入
input:
  user_id: "eval_user_005"
  plan_id: 4
  thread_id: "eval_thread_mixed_001"
  message: "你好！我是一名初中数学老师，想让你帮我设计一节关于二次函数的课"
  attachments: []

# 上下文设置
context:
  user_profile:
    role: "teacher"
    subject: null
    grade: null
  chat_history: []
  available_memories: []

# 期望结果
expectations:
  intent: "teaching_plan"
  should_extract_elements: true
  extracted_subject: "数学"
  extracted_grade: "初中"
  extracted_topic: "二次函数"

# 断言规则
assertions:
  - type: "route_match"
    field: "intent"
    expected: "teaching_plan"
    weight: 1.0

  - type: "contains"
    field: "extracted_elements.subject"
    expected: "数学"
    weight: 0.7

  - type: "contains"
    field: "extracted_elements.grade"
    expected: "初中"
    weight: 0.7

  - type: "contains"
    field: "extracted_elements.topic"
    expected: "二次函数"
    weight: 0.8

# 元数据
metadata:
  author: "eval_designer"
  created_at: "2026-06-11"
  tags: ["intent", "mixed", "teaching_plan"]

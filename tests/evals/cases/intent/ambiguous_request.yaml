# 意图识别评估用例 - 模糊请求

case_id: intent_ambiguous_001
category: intent_recognition
description: "处理模糊的教学请求"
version: "1.0"

# 测试输入
input:
  user_id: "eval_user_004"
  plan_id: 3
  thread_id: "eval_thread_ambiguous_001"
  message: "我想准备一节课"
  attachments: []

# 上下文设置
context:
  user_profile:
    role: "teacher"
    subject: null
    grade: null
  chat_history: []
  available_memories: []

# 期望结果
expectations:
  intent: "teaching_plan"
  should_extract_elements: true
  extracted_elements_incomplete: true
  should_trigger_followup: true

# 断言规则
assertions:
  - type: "route_match"
    field: "intent"
    expected: "teaching_plan"
    weight: 1.0

# 元数据
metadata:
  author: "eval_designer"
  created_at: "2026-06-11"
  tags: ["intent", "ambiguous", "followup"]
